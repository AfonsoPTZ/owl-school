
<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>OlwSchool — Área do Professor</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

  <!-- Navbar -->
  <div id="navbar-container"></div>

  <!-- ============================== -->
  <!-- Conteúdo principal -->
  <!-- ============================== -->
  <div class="flex-grow-1" style="margin-left: 220px;">
    <main class="container py-4">

      <h1 class="h4 mb-2">Bem-vindo, <span id="userName"></span>!</h1>
      <p class="mb-4 text-muted">Aqui estão suas informações.</p>

      <!-- Card inicial (opcional, já no padrão das outras telas) -->
      <div class="card shadow-sm border-0">
        <div class="card-body py-5 text-center">
          <h2 class="h6 fw-bold mb-2">Painel do Professor</h2>
          <p class="mb-0 text-muted">Use o menu à esquerda para acessar tarefas, provas, chamadas e comunicados.</p>
        </div>
      </div>

      <div class="card p-3">
  <h5>Assistente OWL School</h5>

  <div class="mb-3">
    <input
      type="text"
      id="inputIA"
      class="form-control"
      placeholder="Digite sua pergunta"
    >
  </div>

  <button class="btn btn-primary" onclick="enviarPerguntaIA()">
    Enviar
  </button>

  <pre id="respostaIA" class="mt-3 mb-0"></pre>
</div>

    </main>
  </div>

  <!-- ============================== -->
  <!-- Scripts -->
  <!-- ============================== -->
  <script defer src="/owl-school/public/api/auth/authme.js"></script>
  <script defer src="/owl-school/public/api/auth/logout.js"></script>
    <script defer src="/owl-school/public/api/AI.js"></script>

  <script src="/owl-school/public/api/utils/get_name.js"></script>

  <script>
if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", function() { protectPage(["professor"]); });
} else {
  protectPage(["professor"]);
}
</script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="/owl-school/public/professor/navbar.js"></script>

</body>
</html>
