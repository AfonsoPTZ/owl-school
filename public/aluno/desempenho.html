<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>OlwSchool — Minhas Notas e Frequência</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

  <!-- Navbar -->
  <div id="navbar-container"></div>

  <div class="flex-grow-1" style="margin-left: 220px;">
    <main class="container py-4">

      <!-- ============================== -->
      <!-- Notas -->
      <!-- ============================== -->
      <h1 class="h5 mb-3">📊 Minhas Notas</h1>

      <table class="table table-striped align-middle">
        <thead>
          <tr>
            <th>Prova</th>
            <th>Data</th>
            <th class="text-end">Nota</th>
          </tr>
        </thead>
        <tbody id="tbodyNotas"></tbody>
      </table>

      <!-- ============================== -->
      <!-- Frequência -->
      <!-- ============================== -->
      <h2 class="h5 mt-5 mb-3">🕒 Frequência</h2>

      <table class="table table-striped align-middle">
        <thead>
          <tr>
            <th>Data</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="tbodyFrequencias"></tbody>
      </table>

    </main>
  </div>

  <!-- ============================== -->
  <!-- Scripts -->
  <!-- ============================== -->
  <script defer src="/owl-school/public/api/auth/authme.js"></script>
  <script src="/owl-school/public/api/auth/logout.js" defer></script>

  <script src="/owl-school/public/api/utils/aluno/nota_aluno.js"></script>
  <script src="/owl-school/public/api/utils/aluno/frequencia_aluno.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      protectPage(["aluno"]);
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="/owl-school/public/aluno/navbar.js"></script>

</body>
</html>
